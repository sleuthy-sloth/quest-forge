name: Mirror to Codeberg

on:
  push:
    branches: ['**']
    tags: ['**']
  delete:

concurrency:
  group: mirror-codeberg
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Configure SSH for Codeberg
        env:
          CODEBERG_SSH_KEY: ${{ secrets.CODEBERG_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$CODEBERG_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -t rsa,ecdsa,ed25519 codeberg.org >> ~/.ssh/known_hosts

      - name: Push mirror to Codeberg
        env:
          CODEBERG_REPO: ${{ vars.CODEBERG_REPO }}
        run: |
          git remote add codeberg "$CODEBERG_REPO"
          git push --mirror codeberg
